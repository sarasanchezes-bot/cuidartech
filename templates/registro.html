<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro - CuidarTech</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(90deg,#f6e9ee,#f2d9e2);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:400px;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
width:70px;
height:70px;
margin:auto;
border-radius:20px;
background:linear-gradient(135deg,#7ab6e8,#f39ab0);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
}

h1{
text-align:center;
margin-top:15px;
margin-bottom:5px;
}

.subtitle{
text-align:center;
color:#777;
margin-bottom:25px;
font-size:14px;
}

label{
display:block;
font-size:14px;
margin-bottom:5px;
}

input[type="text"],
input[type="email"],
input[type="password"]{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #d8e3ef;
margin-bottom:15px;
font-size:14px;
}

input:focus{
outline:none;
border:1px solid #7ab6e8;
}

.roles{
display:flex;
gap:10px;
margin-top:10px;
margin-bottom:20px;
}

.role{
flex:1;
border:1px solid #d8e3ef;
padding:15px;
border-radius:12px;
text-align:center;
cursor:pointer;
}

.role input{
margin-right:5px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7ab6e8,#f39ab0);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.login{
text-align:center;
margin-top:15px;
font-size:14px;
}

.login a{
color:#7ab6e8;
text-decoration:none;
}

.message{
color:green;
margin-bottom:10px;
}

.error{
color:red;
margin-bottom:10px;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">❤</div>

<h1>Cuidar-Tech</h1>
<p class="subtitle">Sistema de gestión de cuidados</p>

{% if messages %}
{% for message in messages %}
<p class="message">{{ message }}</p>
{% endfor %}
{% endif %}

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<label>Nombre completo</label>
<input type="text" name="nombre" placeholder="Ingresa tu nombre completo" required>

<label>Correo electrónico</label>
<input type="email" name="correo" placeholder="correo@ejemplo.com" required>

<label>Teléfono</label>
<input type="text" name="telefono" placeholder="+34 600 000 000">

<label>Contraseña</label>
<input type="password" name="password" placeholder="Mínimo 6 caracteres" required>

<label>Confirmar contraseña</label>
<input type="password" name="confirmar_password" placeholder="Repite tu contraseña" required>

<label>Tipo de usuario</label>

<div class="roles">
<label class="role">
<input type="radio" name="id_rol" value="1" required>
Cuidador
</label>

<label class="role">
<input type="radio" name="id_rol" value="2">
Familiar
</label>
</div>

<button type="submit">Registrarse</button>

</form>

<div class="login">
¿Ya tienes cuenta? <a href="{% url 'login' %}">Inicia sesión</a>
</div>

<div style="margin-bottom:20px;">
    <a href="/home/">← Inicio</a>
</div>

</div>

</body>
</html>
