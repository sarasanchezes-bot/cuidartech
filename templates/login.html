<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cuidar-Tech | Login</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(90deg,#f9eef2,#f3dce5);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{
    background:white;
    padding:40px;
    border-radius:20px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
    width:70px;
    height:70px;
    margin:auto;
    border-radius:20px;
    background:linear-gradient(135deg,#7ab6e8,#f39ab0);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    color:white;
}

h1{
    margin-top:15px;
    margin-bottom:5px;
}

.subtitle{
    color:#777;
    margin-bottom:25px;
}

.error{
    color:#e74c3c;
    font-size:14px;
    margin-bottom:15px;
}

label{
    display:block;
    text-align:left;
    font-size:14px;
    margin-bottom:5px;
}

input{
    width:100%;
    padding:12px;
    border-radius:10px;
    border:1px solid #ddd;
    margin-bottom:15px;
    font-size:14px;
}

input:focus{
    outline:none;
    border:1px solid #7ab6e8;
}

.forgot{
    font-size:13px;
    text-align:right;
    margin-bottom:20px;
}

.forgot a{
    text-decoration:none;
    color:#7ab6e8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(90deg,#7ab6e8,#f39ab0);
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<div class="login-card">

<div class="logo">❤</div>

<h1>Cuidar-Tech</h1>
<p class="subtitle">Sistema de gestión de cuidados</p>

<!-- MENSAJE DE ERROR -->
{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST" action="/">
{% csrf_token %}

<label>Correo</label>
<input type="email" name="correo" placeholder="Ingresa tu correo" required>

<label>Contraseña</label>
<input type="password" name="password" placeholder="Ingresa tu contraseña" required>

<div class="forgot">
<a href="{% url 'recuperar_password' %}">¿Olvidaste tu contraseña?</a>
</div>

<button type="submit">Iniciar sesión</button>
<p>¿No tienes cuenta? <a href="{% url 'registro' %}">Regístrate aquí</a></p>

</form>

</div>

</body>
</html>
