<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nueva contraseña - CuidarTech</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(90deg,#f6e9ee,#f2d9e2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
width:360px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.logo{
width:70px;
height:70px;
margin:auto;
border-radius:20px;
background:linear-gradient(135deg,#7ab6e8,#f39ab0);
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
color:white;
}

h1{
margin-top:15px;
margin-bottom:5px;
}

.subtitle{
color:#777;
font-size:14px;
margin-bottom:25px;
}

label{
display:block;
text-align:left;
font-size:14px;
margin-bottom:5px;
}

input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #d8e3ef;
margin-bottom:15px;
font-size:14px;
}

input:focus{
outline:none;
border:1px solid #7ab6e8;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#7ab6e8,#f39ab0);
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.error{
color:red;
margin-bottom:10px;
}

.login{
margin-top:15px;
font-size:14px;
}

.login a{
color:#7ab6e8;
text-decoration:none;
}

</style>

</head>

<body>

<div class="card">

<div class="logo">🔒</div>

<h1>Nueva contraseña</h1>
<p class="subtitle">Crea una nueva contraseña segura</p>

{% if error %}
<p class="error">{{ error }}</p>
{% endif %}

<form method="POST">
{% csrf_token %}

<label>Nueva contraseña</label>
<input type="password" name="nueva_password" placeholder="Ingresa tu nueva contraseña" required>

<label>Confirmar contraseña</label>
<input type="password" name="confirmar_password" placeholder="Repite tu contraseña" required>

<button type="submit">Guardar contraseña</button>

</form>

<div class="login">
<a href="{% url 'login' %}">Volver al inicio de sesión</a>
</div>

</div>

</body>
</html>
